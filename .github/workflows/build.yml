name: Build MagmaKey EXE

on:
  push:
    branches:
      - main
  release:
    types:
      - published

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          python -m PyInstaller --onedir --windowed --icon=assets/magmakey.ico --name MagmaKey --collect-all PyQt6 main.py

      - name: Upload artifact (portable folder)
        uses: actions/upload-artifact@v4
        with:
          name: MagmaKey-portable
          path: dist\MagmaKey

      - name: Upload standalone EXE (optional)
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: MagmaKey-exe
          path: dist\MagmaKey\MagmaKey.exe
